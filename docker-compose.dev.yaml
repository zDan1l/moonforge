services:
  postgres:
    image: postgres:15-alpine
    container_name: moonforge-postgres-dev
    environment:
      POSTGRES_DB: moonforge
      POSTGRES_USER: moonforge
      POSTGRES_PASSWORD: moonforge
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moonforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: